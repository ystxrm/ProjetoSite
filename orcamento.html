<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miolo Grafica</title>
    <meta name="description"
        content="Miolo Gráfica é uma empresa especializada em soluções gráficas de alta qualidade. Oferecemos uma ampla gama de serviços, desde impressão digital até design gráfico, para atender às necessidades de nossos clientes. Com uma equipe experiente e tecnologia avançada, garantimos resultados excepcionais para cada projeto. Seja para materiais promocionais, embalagens ou comunicação visual, a Miolo Gráfica é a escolha certa para transformar suas ideias em realidade.">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/orcamento.css">
</head>

<body>
    <div id="header"></div>
    <div class="container-orcamento">
        <h2 class="orcamento">Orçamento</h2>
        <h3 class="lado">Fale conosco</h3>
        <p class="p-lado">Preencha o formulário para solicitar um Orçamento!</p>
        <form class="formulario-orcamento">
            <input type="text" placeholder="Nome completo" class="campo-input">

            <input type="email" placeholder="Email" class="campo-input">

            <input type="tel" placeholder="Celular" class="campo-input">

            <div class="editor-container">
                <div class="toolbar">
                    <span>A ▼</span> <strong>B</strong> <em>I</em> <u>U</u>
                </div>
                <textarea placeholder="Sua mensagem..." class="campo-texto"></textarea>
            </div>
            <button type="submit" class="botao-enviar">Solicitar Orçamento</button>
        </form>
    </div>
    <div id="footer"></div>
    <script src="/js/componentes.js"></script>
</body>

</html>
